<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="우리 학교 학생들의 자유로운 학습 질문과 답변이 오가는 친근한 소통 공간입니다.">
    <title>우리들의 배움터 - 학습 Q&A 게시판</title>
    <!-- CSS 내부에서 Pretendard 폰트를 로드합니다. -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 앱 헤더 영역 -->
    <header class="app-header">
        <div class="header-logo">
            <svg class="header-logo-icon" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.436 60.436 0 00-.491 6.347A48.627 48.627 0 0112 20.904a48.627 48.627 0 018.232-4.41 60.46 60.46 0 00-.491-6.347m-15.482 0a50.57 50.57 0 00-2.658-.813A59.905 59.905 0 0112 3.493a59.902 59.902 0 0110.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.697 50.697 0 0112 13.489a50.702 50.702 0 017.74-3.342M6.75 15a.75.75 0 100-1.5.75.75 0 000 1.5zm0 0v-3.675A55.378 55.378 0 0112 8.443m-7.007 11.55A5.981 5.981 0 006.75 15.75v-1.5" />
            </svg>
            <h1 class="logo-title">우리들의 배움터</h1>
            <span class="logo-badge">Q&A</span>
        </div>
        <div class="user-profile-badge">
            <span class="user-status-dot"></span>
            <span class="user-name-text">접속 중: <strong>user_01</strong> 님</span>
        </div>
    </header>

    <!-- 메인 2단 레이아웃 컨테이너 -->
    <main class="app-container">
        <!-- [1단] 키워드 사이드바 -->
        <section class="sidebar-keywords" aria-label="질문 키워드 필터">
            <div class="section-title-wrapper">
                <h2>키워드 목록</h2>
            </div>
            <div class="keywords-list-container">
                <!-- 키워드 버튼들이 들어갈 영역 -->
                <ul id="keywords-list" class="keywords-list">
                    <!-- Javascript에서 동적으로 렌더링합니다. -->
                </ul>
            </div>
            <!-- 새 키워드 추가 폼 -->
            <div class="add-keyword-form">
                <input type="text" id="new-keyword-input" placeholder="새 키워드 입력..." maxlength="10" aria-label="새 키워드 입력">
                <button type="button" id="add-keyword-btn" class="btn-primary-sm">추가</button>
            </div>
        </section>

        <!-- [2단] 질문 게시판 메인 영역 (목록/상세 토글) -->
        <section class="main-content" aria-label="질문 게시판 메인">
            
            <!-- 2-A: 질문 목록 뷰 -->
            <div id="feed-view" class="view-panel">
                <!-- 질문 등록 폼 카드 -->
                <div class="card question-write-card">
                    <h3>모르는 내용 질문하기</h3>
                    <form id="question-form" class="question-form">
                        <div class="form-group">
                            <input type="text" id="question-title" placeholder="어떤 부분이 궁금한가요? 한 줄로 요약해 주세요." required maxlength="60" aria-label="질문 제목">
                        </div>
                        <div class="form-group">
                            <textarea id="question-content" placeholder="이해하기 어려웠던 개념이나 문제를 자세히 적어주세요. 함께 고민해봐요!" required aria-label="질문 내용"></textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-group select-wrapper">
                                <label for="question-keyword-select" class="sr-only">키워드 선택</label>
                                <select id="question-keyword-select" required>
                                    <!-- Javascript에서 동적으로 키워드 목록을 받아 채워넣습니다. -->
                                </select>
                            </div>
                            <button type="submit" class="btn-primary">질문 등록하기</button>
                        </div>
                    </form>
                </div>

                <!-- 질문 피드 헤더 및 검색 -->
                <div class="feed-header">
                    <div class="feed-title-area">
                        <h3 id="current-filter-title">전체 질문 목록</h3>
                        <span id="question-count-badge" class="count-badge">0</span>
                    </div>
                    <div class="search-box">
                        <input type="text" id="search-input" placeholder="질문 검색..." aria-label="질문 검색">
                    </div>
                </div>

                <!-- 질문 카드 목록 컨테이너 -->
                <div id="question-cards-container" class="question-cards-container">
                    <!-- Javascript에서 질문 카드들을 렌더링합니다. -->
                </div>
            </div>

            <!-- 2-B: 질문 상세 및 답변 스레드 뷰 (질문 클릭 시 전환됨) -->
            <div id="thread-view" class="view-panel hidden">
                <div class="thread-header">
                    <button type="button" id="back-to-feed-btn" class="btn-text-back">← 질문 목록으로 돌아가기</button>
                </div>
                
                <div class="thread-body">
                    <!-- 상세 질문 카드 -->
                    <div class="thread-question-detail">
                        <div class="thread-question-meta">
                            <span id="detail-keyword" class="tag-badge"></span>
                            <span id="detail-author" class="author-name">작성자</span>
                            <span id="detail-time" class="time-stamp">방금 전</span>
                        </div>
                        <h3 id="detail-title" class="detail-title">질문 제목</h3>
                        <p id="detail-content" class="detail-content">질문 상세 내용이 들어갑니다.</p>
                    </div>

                    <!-- 답변 목록 피드 -->
                    <div class="thread-comments-section">
                        <h4>
                            답변 <span id="detail-comments-count" class="count-badge">0</span>
                        </h4>
                        <div id="comments-container" class="comments-container">
                            <!-- Javascript에서 답변 목록을 동적으로 렌더링합니다. -->
                        </div>
                    </div>
                </div>

                <!-- 답변 작성 입력 영역 -->
                <div class="thread-comment-input-area">
                    <form id="comment-form" class="comment-form">
                        <textarea id="comment-content" placeholder="친구를 돕기 위해 친절한 답변을 남겨주세요!" required aria-label="답변 내용 입력"></textarea>
                        <div class="comment-form-actions">
                            <span class="user-indicator">답변자: user_01</span>
                            <button type="submit" class="btn-primary-sm">답변 등록</button>
                        </div>
                    </form>
                </div>
            </div>

        </section>
    </main>

    <!-- 스크립트 파일 로드 -->
    <script type="module" src="app.js"></script>
</body>
</html>
