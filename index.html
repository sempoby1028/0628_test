<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="우리 학교 학생들의 자유로운 학습 질문과 답변이 오가는 친근한 소통 공간입니다.">
    <title>우리들의 배움터 - 학습 Q&A 게시판</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <!-- 1. 로그인/회원가입 모달 오버레이 (비로그인 상태일 때만 보임) -->
    <div id="login-overlay" class="login-overlay">
        <div class="login-card">
            <div class="login-header">
                <h2>우리들의 배움터</h2>
                <p>학교 친구들과 함께 공부하며 질문을 나눠요!</p>
            </div>
            
            <form id="email-auth-form" class="auth-form">
                <div class="form-group">
                    <input type="email" id="auth-email" placeholder="이메일 주소" required autocomplete="username">
                </div>
                <div class="form-group">
                    <input type="password" id="auth-password" placeholder="비밀번호 (6자리 이상)" required autocomplete="current-password">
                </div>
                <div class="auth-buttons">
                    <button type="button" id="btn-login-email" class="btn-primary">이메일로 로그인</button>
                    <button type="button" id="btn-signup-email" class="btn-secondary">이메일로 1초 만에 가입하기</button>
                </div>
            </form>

            <div class="auth-divider">
                <span>또는</span>
            </div>

            <button type="button" id="btn-login-google" class="btn-google">
                <svg viewBox="0 0 24 24" class="google-icon" width="20" height="20">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                구글 계정으로 시작하기
            </button>
        </div>
    </div>

    <!-- 2. 메인 앱 영역 (로그인 완료 시에만 보임) -->
    <div id="main-app-wrapper" class="hidden">
        <!-- 앱 헤더 영역 -->
        <header class="app-header">
            <div class="header-logo">
                <svg class="header-logo-icon" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.436 60.436 0 00-.491 6.347A48.627 48.627 0 0112 20.904a48.627 48.627 0 018.232-4.41 60.46 60.46 0 00-.491-6.347m-15.482 0a50.57 50.57 0 00-2.658-.813A59.905 59.905 0 0112 3.493a59.902 59.902 0 0110.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.697 50.697 0 0112 13.489a50.702 50.702 0 017.74-3.342M6.75 15a.75.75 0 100-1.5.75.75 0 000 1.5zm0 0v-3.675A55.378 55.378 0 0112 8.443m-7.007 11.55A5.981 5.981 0 006.75 15.75v-1.5" />
                </svg>
                <h1 class="logo-title">우리들의 배움터</h1>
                <span class="logo-badge">Q&A</span>
            </div>
            
            <div class="user-profile-badge">
                <span class="user-status-dot"></span>
                <span class="user-name-text">접속 중: <strong id="header-user-name">...</strong> 님</span>
                <button type="button" id="btn-logout" class="btn-logout-sm">로그아웃</button>
            </div>
        </header>

        <!-- 메인 2단 레이아웃 컨테이너 -->
        <main class="app-container">
            <!-- [1단] 키워드 사이드바 -->
            <section class="sidebar-keywords" aria-label="질문 키워드 필터">
                <div class="section-title-wrapper">
                    <h2>키워드 목록</h2>
                </div>
                <div class="keywords-list-container">
                    <ul id="keywords-list" class="keywords-list">
                        <!-- Javascript에서 동적으로 렌더링 -->
                    </ul>
                </div>
                <div class="add-keyword-form">
                    <input type="text" id="new-keyword-input" placeholder="새 키워드 입력..." maxlength="10" aria-label="새 키워드 입력">
                    <button type="button" id="add-keyword-btn" class="btn-primary-sm">추가</button>
                </div>
            </section>

            <!-- [2단] 질문 게시판 메인 영역 -->
            <section class="main-content" aria-label="질문 게시판 메인">
                
                <!-- 2-A: 질문 목록 뷰 -->
                <div id="feed-view" class="view-panel">
                    <div class="card question-write-card">
                        <h3>모르는 내용 질문하기</h3>
                        <form id="question-form" class="question-form">
                            <div class="form-group">
                                <input type="text" id="question-title" placeholder="어떤 부분이 궁금한가요? 한 줄로 요약해 주세요." required maxlength="60">
                            </div>
                            <div class="form-group">
                                <textarea id="question-content" placeholder="이해하기 어려웠던 개념이나 문제를 자세히 적어주세요." required></textarea>
                            </div>
                            <div class="form-row">
                                <div class="form-group select-wrapper">
                                    <label for="question-keyword-select" class="sr-only">키워드 선택</label>
                                    <select id="question-keyword-select" required>
                                    </select>
                                </div>
                                <button type="submit" class="btn-primary">질문 등록하기</button>
                            </div>
                        </form>
                    </div>

                    <div class="feed-header">
                        <div class="feed-title-area">
                            <h3 id="current-filter-title">전체 질문 목록</h3>
                            <span id="question-count-badge" class="count-badge">0</span>
                        </div>
                        <div class="search-box">
                            <input type="text" id="search-input" placeholder="질문 검색...">
                        </div>
                    </div>

                    <div id="question-cards-container" class="question-cards-container">
                    </div>
                </div>

                <!-- 2-B: 질문 상세 스레드 뷰 -->
                <div id="thread-view" class="view-panel hidden">
                    <div class="thread-header">
                        <button type="button" id="back-to-feed-btn" class="btn-text-back">← 질문 목록으로 돌아가기</button>
                    </div>
                    
                    <div class="thread-body">
                        <div class="thread-question-detail">
                            <div class="thread-question-meta">
                                <span id="detail-keyword" class="tag-badge"></span>
                                <span id="detail-author" class="author-name">작성자</span>
                                <span id="detail-time" class="time-stamp">방금 전</span>
                            </div>
                            <h3 id="detail-title" class="detail-title">질문 제목</h3>
                            <p id="detail-content" class="detail-content">질문 상세 내용이 들어갑니다.</p>
                        </div>

                        <div class="thread-comments-section">
                            <h4>답변 <span id="detail-comments-count" class="count-badge">0</span></h4>
                            <div id="comments-container" class="comments-container">
                            </div>
                        </div>
                    </div>

                    <div class="thread-comment-input-area">
                        <form id="comment-form" class="comment-form">
                            <textarea id="comment-content" placeholder="친구를 돕기 위해 친절한 답변을 남겨주세요!" required></textarea>
                            <div class="comment-form-actions">
                                <span class="user-indicator">답변자: <span id="comment-author-name"></span></span>
                                <button type="submit" class="btn-primary-sm">답변 등록</button>
                            </div>
                        </form>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- 스크립트 파일 로드 -->
    <script type="module" src="app.js"></script>
</body>
</html>
